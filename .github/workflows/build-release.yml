name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.3xx'

      - name: Restore
        run: dotnet restore VRCFaceTracking-LiveLink.sln

      - name: Build
        run: dotnet build LiveLinkModule/LiveLinkModule.csproj -c Release --no-restore

      - name: Package
        run: |
          mkdir release
          copy LiveLinkModule\bin\Release\net8.0\LiveLinkModule.dll release\
          copy module.json release\
          Compress-Archive -Path release\* -DestinationPath LiveLinkModule.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveLinkModule
          path: LiveLinkModule.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LiveLinkModule.zip
